<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #fff8ef 0%, #f9fbff 55%, #edf7ff 100%);
        }

        .form-card {
            max-width: 720px;
            border: 0;
            border-radius: 24px;
            box-shadow: 0 18px 45px rgba(31, 41, 55, 0.10);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="card form-card mx-auto">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <p class="text-uppercase text-warning fw-semibold mb-2">Update</p>
                        <h1 class="h2 mb-1">Edit User</h1>
                        <p class="text-secondary mb-0">Change the values below and save the updated record.</p>
                    </div>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Back</a>
                </div>

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            name="name"
                            value="{{ user.name }}"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label">Email</label>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            value="{{ user.email }}"
                            required
                        >
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">Update User</button>
                        <a href="{{ url_for('index') }}" class="btn btn-light border">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
