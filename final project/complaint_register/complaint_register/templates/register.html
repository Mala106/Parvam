<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Complaint Register</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #17202a;
    --paper: #f6f7f9;
    --accent: #c84b31;
    --muted: #6b7280;
    --card: #ffffff;
    --border: #d8dee8;
    --shadow: 0 24px 60px rgba(23,32,42,0.12);
  }
  body {
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 12px;
    background:
      radial-gradient(circle at 20% 0%, rgba(200,75,49,0.12), transparent 28%),
      linear-gradient(180deg, #fbfcfd 0%, var(--paper) 50%, #eef1f5 100%);
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.36;
    pointer-events: none;
  }
  .register-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    padding: 0 16px 32px;
  }
  .brand {
    text-align: center;
    margin-bottom: 24px;
  }
  .brand-icon {
    width: 56px;
    height: 56px;
    margin: 0 auto 14px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 14px 30px rgba(200,75,49,0.22);
  }
  .brand-icon svg { width: 28px; height: 28px; fill: white; }
  .brand h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: 0;
  }
  .brand p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 32px;
    box-shadow: var(--shadow);
  }
  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
    font-family: 'DM Mono', monospace;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    background: white;
    color: var(--ink);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input:focus {
    border-color: #2867b2;
    box-shadow: 0 0 0 3px rgba(40,103,178,0.12);
  }
  .error-box {
    background: #fef0ee;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 18px;
  }
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: 1px solid rgba(23,32,42,0.16);
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 12px 22px rgba(200,75,49,0.20);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 28px rgba(200,75,49,0.24); }
  .btn:active { transform: translateY(1px); box-shadow: 0 8px 16px rgba(200,75,49,0.18); }
  .switch-link {
    margin-top: 18px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .switch-link a {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
  }
  .switch-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="register-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
    </div>
    <h1>Create Account</h1>
    <p>// users can register and submit complaints</p>
  </div>

  <div class="card">
    {% if error %}
    <div class="error-box">! {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose username" value="{{ username }}" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose password" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
    <div class="switch-link">
      Already have an account?
      <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
